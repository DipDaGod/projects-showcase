<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Projects</title>

<style>
:root{
    --bg:#0d1117;
    --card:#161b22;
    --border:#30363d;
    --text:#c9d1d9;
    --accent:#58a6ff;
    --muted:#8b949e;
    --green:#238636;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:40px 20px;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

h1{
    text-align:center;
    margin-bottom:6px;
}

.sub{
    text-align:center;
    color:var(--muted);
    margin:0 0 20px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:28px;
}

#filter{
    width:280px;
    padding:10px 14px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    outline:none;
}

#refresh{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:var(--green);
    color:white;
    font-weight:600;
    transition:.15s;
}

#refresh:hover{
    background:#2ea043;
}

#refresh:disabled{
    opacity:.6;
    cursor:not-allowed;
}

#grid{
    max-width:1100px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:18px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
    transition:.15s;
}

.card:hover{
    transform:translateY(-4px);
    border-color:var(--accent);
}

.name{
    color:var(--accent);
    font-size:1.1rem;
    text-decoration:none;
    font-weight:600;
}

.name:hover{
    text-decoration:underline;
}

.desc{
    color:var(--muted);
    min-height:42px;
    font-size:.92rem;
}

.site-link{
    display:inline-flex;
    width:fit-content;
    align-items:center;
    gap:6px;
    padding:7px 11px;
    border-radius:6px;
    text-decoration:none;
    color:#7ee787;
    background:rgba(126,231,135,.08);
    border:1px solid rgba(126,231,135,.3);
}

.site-link:hover{
    background:rgba(126,231,135,.16);
}

.meta{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:auto;
    color:var(--muted);
    font-size:.85rem;
}

.lang-dot{
    width:9px;
    height:9px;
    display:inline-block;
    border-radius:50%;
    background:var(--accent);
    margin-right:5px;
}

#status{
    text-align:center;
    color:var(--muted);
    margin-top:32px;
    font-size:.85rem;
}
</style>
</head>

<body>

<h1>My Projects</h1>
<p class="sub" id="subtitle">Loading repositories...</p>

<div class="controls">
    <input id="filter" placeholder="Filter repositories...">
    <button id="refresh">↻ Refresh</button>
</div>

<div id="grid"></div>

<div id="status"></div>

<script>
const USERNAME = "dipdagod";

const EXCLUDE = [
    "dipdagod.github.io",
    "projects-showcase",
    "Wisdom-Woods",
];

const SORT_BY_STARS = false;

const CACHE_KEY = "github_repo_cache";
const CACHE_TIME = 10 * 60 * 1000; // 10 minutes

const grid = document.getElementById("grid");
const subtitle = document.getElementById("subtitle");
const status = document.getElementById("status");
const refreshBtn = document.getElementById("refresh");

let allRepos = [];

// -------------------------
// Fetch repositories
// -------------------------
async function fetchRepos(force = false){

    // Try cache first
    if(!force){
        const cache = JSON.parse(localStorage.getItem(CACHE_KEY));

        if(cache && (Date.now() - cache.time) < CACHE_TIME){

            allRepos = cache.data;

            render(allRepos);

            subtitle.textContent =
                `${allRepos.length} public repositories • Cached`;

            status.textContent =
                `Last updated ${new Date(cache.time).toLocaleString()}`;

            return;
        }
    }

    refreshBtn.disabled = true;
    refreshBtn.textContent = "Loading...";

    try{

        const response = await fetch(
            `https://api.github.com/users/${USERNAME}/repos?per_page=100&sort=updated`
        );

        if(!response.ok){
            throw new Error(`GitHub API Error ${response.status}`);
        }

        let repos = await response.json();

        repos = repos.filter(repo =>
            !repo.fork &&
            !EXCLUDE.includes(repo.name)
        );

        if(SORT_BY_STARS){
            repos.sort((a,b)=>b.stargazers_count-a.stargazers_count);
        }

        allRepos = repos;

        render(allRepos);

        localStorage.setItem(
            CACHE_KEY,
            JSON.stringify({
                time: Date.now(),
                data: repos
            })
        );

        subtitle.textContent =
            `${repos.length} public repositories • Live`;

        status.textContent =
            `Last updated ${new Date().toLocaleString()}`;

    }
    catch(err){

        console.error(err);

        subtitle.textContent = "Couldn't load repositories.";

        status.textContent = err.message;

        grid.innerHTML = `
            <div class="card">
                <strong>Failed to load repositories.</strong>
                <span>${err.message}</span>
            </div>
        `;
    }

    refreshBtn.disabled = false;
    refreshBtn.textContent = "↻ Refresh";
}

// -------------------------
// Render
// -------------------------
function render(repos){

    grid.innerHTML = repos.map(repo => `
        <div class="card">

            <a
                class="name"
                href="${repo.html_url}"
                target="_blank"
            >
                ${escapeHtml(repo.name)}
            </a>

            <div class="desc">
                ${repo.description
                    ? escapeHtml(repo.description)
                    : "No description."}
            </div>

            ${
                repo.homepage
                    ? `
                    <a
                        class="site-link"
                        href="${repo.homepage}"
                        target="_blank"
                    >
                        🔗 Visit Site
                    </a>
                    `
                    : ""
            }

            <div class="meta">

                ${
                    repo.language
                        ? `
                        <span>
                            <span class="lang-dot"></span>
                            ${repo.language}
                        </span>
                        `
                        : ""
                }

                <span>★ ${repo.stargazers_count}</span>

                <span>
                    Updated ${new Date(repo.pushed_at).toLocaleDateString()}
                </span>

            </div>

        </div>
    `).join("");

}

// -------------------------
// Escape HTML
// -------------------------
function escapeHtml(str){

    return String(str).replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        "\"":"&quot;",
        "'":"&#39;"
    })[m]);

}

// -------------------------
// Filter
// -------------------------
document.getElementById("filter").addEventListener("input", e => {

    const q = e.target.value.toLowerCase();

    render(
        allRepos.filter(repo =>
            repo.name.toLowerCase().includes(q)
        )
    );

});

// -------------------------
// Refresh button
// -------------------------
refreshBtn.addEventListener("click", () => {
    fetchRepos(true);
});

// -------------------------
// Initial load
// -------------------------
fetchRepos();

// -------------------------
// Auto refresh every 10 mins
// -------------------------
setInterval(() => {
    fetchRepos(true);
}, CACHE_TIME);

</script>

</body>
</html>
